services:
  transponster:
    image: transponster-bot:latest
    build: .
    container_name: transponster-container
    env_file: .env
    ports:
      - "3000:3000"
    restart: always
    # Cap at 1.3 GB so a runaway transcription can't OOM-kill Apache and other
    # containers on this 1.9 GB host. Docker will SIGKILL + restart us instead.
    mem_limit: 1300m
    memswap_limit: 1300m
    environment:
      - TRACKER_DATA_DIR=/app/data
      - GIT_SHA=${GIT_SHA:-unknown}
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"